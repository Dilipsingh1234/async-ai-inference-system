apiVersion: apps/v1
kind: Deployment
metadata:
  name: async-ai-consumer
  labels:
    app: async-ai-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: async-ai-consumer
  template:
    metadata:
      labels:
        app: async-ai-consumer
    spec:
      containers:
        - name: consumer
          image: async-ai-consumer:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: AWS_REGION
              value: "us-east-1"
            - name: S3_BUCKET
              value: "async-ai-inference-dilip"
            - name: MODEL_S3_KEY
              value: "models/model.pkl"
            - name: SQS_QUEUE_URL
              value: "https://sqs.us-east-1.amazonaws.com/471112754315/async-ai-inference-queue"
            - name: PREDICTION_PREFIX
              value: "predictions/"